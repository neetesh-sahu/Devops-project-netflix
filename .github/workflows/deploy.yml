name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t neeteshsahu/netflix-clone .

      - name: Push to Docker Hub
        run: docker push neeteshsahu/netflix-clone:latest
         

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo usermod -aG docker ubuntu
            sudo newgrp docker
            sudo docker stop netflix-app || true
            sudo docker rm netflix-app || true
            sudo docker pull neeteshsahu/netflix-clone:latest
            sudo docker run -d -p 3000:3000 --name netflix-app neeteshsahu/netflix-clone:latest